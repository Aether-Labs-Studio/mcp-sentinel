name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Vet
        run: make vet

      - name: Run tests
        run: make test

      - name: Build all platforms
        run: make build-all

      - name: Rename binaries with version
        run: |
          VERSION=${GITHUB_REF_NAME}
          cd bin
          mv mcp-sentinel-linux-amd64   mcp-sentinel-${VERSION}-linux-amd64
          mv mcp-sentinel-linux-arm64   mcp-sentinel-${VERSION}-linux-arm64
          mv mcp-sentinel-darwin-amd64  mcp-sentinel-${VERSION}-darwin-amd64
          mv mcp-sentinel-darwin-arm64  mcp-sentinel-${VERSION}-darwin-arm64
          mv mcp-sentinel-windows-amd64.exe mcp-sentinel-${VERSION}-windows-amd64.exe

      - name: Generate checksums
        run: |
          cd bin
          sha256sum mcp-sentinel-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/mcp-sentinel-*
            bin/checksums.txt
            rules.json
            config.json

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download checksums
        run: |
          curl -fsSL "https://github.com/Aether-Labs-Studio/mcp-sentinel/releases/download/${GITHUB_REF_NAME}/checksums.txt" \
            -o checksums.txt

      - name: Publish formula via GitHub API
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
          BASE_URL: https://github.com/Aether-Labs-Studio/mcp-sentinel/releases/download/${{ github.ref_name }}
        run: |
          export SHA_DARWIN_AMD64=$(grep "darwin-amd64$" checksums.txt | awk '{print $1}')
          export SHA_DARWIN_ARM64=$(grep "darwin-arm64$" checksums.txt | awk '{print $1}')
          export SHA_LINUX_AMD64=$(grep  "linux-amd64$"  checksums.txt | awk '{print $1}')
          export SHA_LINUX_ARM64=$(grep  "linux-arm64$"  checksums.txt | awk '{print $1}')
          python3 .github/scripts/update-brew-tap.py
